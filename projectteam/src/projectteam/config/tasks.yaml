    You will receive the Product Owner's product requirements and the Architect's architecture document as context. Your task is to fill the phase plan template below with a clear project plan and roadmap based on the project idea and the context.
        - Preserve ALL headings, section order, and markdown structure from the template.
        - Replace all placeholders (e.g. project_name, phase_1_name and similar) and fill every section.
        - Output the complete document as your response.
        - Do not add any additional headings, sections, or markdown structure that is not in the template.
        where the template says example content, you should replace it with the actual content based on the project idea, product requirements, and architecture.
        The final output MUST be a complete, self-contained markdown document following the same structure as the template.
  
  expected_output: >
    A complete project_plan.md document with all sections filled based on the project idea, product requirements, and architecture. No placeholder text or empty sections.
  agent: PM_agent
  input: >
    Use the following template and fill it based on the project idea and the context from the Product Owner and Architect. Template:
