business_analyst_task:
  description: >
    You are the Senior business analyst for the project. The project idea is: {project_idea}.
    Your task is to fill the product requirements template below with clear, concise content based on this project idea.
    - Preserve ALL headings, section order, and markdown structure from the template.
    - Replace all placeholders (e.g. project_name, date) and fill every section.
    - Output the complete document as your response.
    - Do not add any additional headings, sections, or markdown structure that is not in the template.
    where the template says example content, you should replace it with the actual content based on the project idea, product requirements, and architecture.
    The final output MUST be a complete, self-contained markdown document following the same structure as the template.
    Replace all placeholders (e.g. project_name, date) and fill every section. Output the complete document as your response.
  expected_output: >
    A complete product_requirements.md document with all sections filled based on the project idea. No placeholder text or empty sections.
  agent: business_analyst_agent
  input: >
    Use the following template and fill it based on the project idea. Template:
    {product_requirements_template}
  output_file: output/product_requirements.md
  create_directory: true

architect_task:
  description: >
    You are the Senior Technical and Solution Architect for the project. The project idea is: {project_idea}.
    You will receive the Business Analyst's product requirements as context. First, use the FileReadTool to read the generated product requirements file at 'output/product_requirements.md' so you clearly understand the functional requirements and use cases.
    Next, use FileReadTool to read these architecture skill references (knowledge pack) before drafting:
    - 'knowledge/ai-stack-playbook.md'
    - 'knowledge/api-design-cookbook.md'
    - 'knowledge/infra-resilience-defaults.md'
    - 'knowledge/security-threat-checklist.md'
    - 'knowledge/external-skills/api-design-patterns.md'
    - 'knowledge/external-skills/deployment-patterns.md'
    - 'knowledge/external-skills/database-migration-patterns.md'
    - 'knowledge/external-skills/security-review-checklist.md'
    Your job is NOT to restate user stories or high-level requirements. Instead, you must define a concrete technical and data architecture that can be implemented by an engineering team.

    If the project idea or requirements mention AI, LLMs, or an "AI-based" solution, you MUST treat this as an AI-centric system. In that case, your architecture must:
    - Fill the template section "AI / ML Framework and Stack" (Section 5) with SPECIFIC product and library names. You MUST name: (1) the LLM provider and model (e.g. OpenAI gpt-4o, Anthropic Claude 3.5), (2) the orchestration framework (e.g. LangChain, LlamaIndex, or custom OpenAI SDK), (3) embedding model and vector store if used (e.g. OpenAI embeddings + Pinecone or Chroma), (4) how tools are implemented (e.g. LangChain tools, OpenAI function calling). Do NOT use generic phrases like "AI models", "ML capabilities", or "integrate AI" without naming the actual technology, SDK, or service.
    - Show how the chosen AI/LLM stack interacts with core services (e.g. orchestrator service, tools for flight/hotel search, calendar, maps, etc.).
    - Include data and infra considerations specific to AI (e.g. prompt/response logging, safety filters, model selection and fallback, latency and cost controls) and name any libraries or services used.
    - Make AI architecture a first-class part of the solution (not an afterthought).

    You must avoid generic, non-technical prose. For every major capability (LLM, orchestration, vector search, message broker, API gateway, database, cache), name a concrete technology, framework, or library (with version where relevant). Do not leave placeholders like "framework:" or "language:" empty; use real choices (e.g. FastAPI, PostgreSQL 15, Redis 7).

    Focus this document on:
    - Application and service architecture (modules/components, responsibilities, and how they interact). Default to a modular monolith or a small set of coarse-grained services for MVP; only choose a fine-grained microservices architecture if there are strong, explicit reasons.
    - API design (key API domains, example endpoints, request/response shapes, error handling, and versioning approach).
    - Gateway / edge architecture (which API gateway or edge component is used, how routing, rate limiting, and observability are handled).
    - Authentication and authorization model (e.g. OAuth2/OIDC, JWT, session-based, where tokens are issued and validated, roles/permissions model).
    - Data architecture (core entities, relationships, high-level schema, which data stores are used for which purposes, and how data flows between services).
    - Infrastructure / deployment (environments, how the system is deployed, scaling strategy, load balancers, containers/serverless, queues, caches).
    - Cross-cutting concerns (logging, metrics, tracing, configuration management, secrets handling, security controls, resilience patterns).

    Use the architecture template below as the skeleton for the document, but make sure the content in each section is deeply technical and implementation-oriented, with a dedicated focus on how AI/LLM capabilities are orchestrated (e.g. LLM calls, tools like flight/hotel search, vector search, and how these are exposed through APIs).
    Use at least one mermaid diagram for components or deployment (e.g. a component diagram showing services, gateway, databases, and external APIs).

    OUTPUT METHOD (mandatory):
    - Start by copying the entire architecture template into your output verbatim (including all subheadings and all tables).
    - Then fill it in by replacing placeholders and writing into the provided bullet slots and tables.
    - Do not delete template lines, headings, subheadings, or table headers. Add rows where needed, but keep the structure intact.

    - Preserve ALL headings/subheadings, section order, and markdown structure from the template.
    - Do NOT remove any template tables. You must fill them in (add rows as needed) and keep the table headers unchanged.
    - Do NOT replace template tables with free-form bullets. The tables are required outputs for developer usability.
    - REQUIRED TABLES (must be real markdown tables, not inline code). Each must include the header row AND the separator row:
      - Endpoint catalog:
        | Domain | Endpoint | Method | Auth | Request (summary) | Response (summary) | Error shape |
        |---|---|---|---|---|---|---|
      - Threat table:
        | Threat | Impact | Mitigation | Owner / control |
        |---|---|---|---|
      - Resilience defaults:
        | Component | Timeout | Retries | Circuit breaker | Bulkhead/queue | Notes |
        |---|---:|---:|---|---|---|
      - SLI/SLO table:
        | SLI | Target SLO | Window | Alert threshold | Notes |
        |---|---|---|---|---|
      - ADR table:
        | ADR | Decision | Alternatives | Rationale | Consequences |
        |---|---|---|---|---|
    - Replace all placeholders (e.g. project_name, version, date) and fill every section with concrete architectural decisions.
    - Do NOT copy full user stories from the product requirements; refer to them only when mapping capabilities to components and APIs.
    - Replace any example text in the template with real architecture content tailored to this project.
    - HARD REQUIREMENT: Your final output MUST include EVERY section from the template, including later sections (e.g. Observability, Quality Attributes/ADRs, Development Guidance, Delivery Breakdown, Risks, Appendices). Do not stop early after Security/Infrastructure.
    - Before you finish, do a self-check: scan the template headings and ensure each appears in your output at least once and has non-trivial content.
    - REQUIRED HEADINGS (must appear verbatim, in this exact order):
      1) ## 1. Document Overview
      2) ## 2. System Context
      3) ## 3. Solution Overview
      4) ## 4. Application Architecture
      5) ## 5. AI / ML Framework and Stack (required for AI-centric projects)
      6) ## 6. Technology Architecture
      7) ## 7. Data Architecture
      8) ## 8. API and Integration Architecture
      9) ## 9. Security Architecture
      10) ## 10. Infrastructure Architecture
      11) ## 11. Observability Architecture
      12) ## 12. Quality Attributes and Architecture Decisions
      13) ## 13. Development Guidance for Engineering Teams
      14) ## 14. Suggested Delivery Breakdown for PM and Teams
      15) ## 15. Open Risks and Architecture Concerns
      16) ## 16. Appendices
    - STYLE REQUIREMENTS (keep it tight and developer-usable):
      - Prefer bullet lists and short tables over long prose. Avoid paragraphs longer than 4 lines.
      - Each top-level section (##) must contain at least 6 non-trivial bullets or an equivalent amount of concrete content.
      - Every tech choice must be actionable: name the product/library/service and include a version where it matters.
      - For APIs, include at least 6 endpoints total across domains with representative request/response JSON and error shape.
      - For data, include a concise entity list plus 5-10 key fields for the top 5 entities and key relationships.
      - For infra, include deployment topology, scaling knobs, and concrete resilience defaults (timeouts/retries/circuit breakers).
      - For security, include at least 8 threats with mitigations and a clear authn/authz enforcement model.
    - DIAGRAM REQUIREMENTS:
      - Under Section 4 (Application Architecture), output a valid ```mermaid block for the Component Diagram that matches the modules/services you describe (UI, API/gateway, backend services/modules, AI orchestrator, DB, cache, external APIs).
      - Under Section 10 (Infrastructure Architecture), output a valid ```mermaid block for the Deployment Diagram that shows environments or tiers, gateway/load balancer, app runtime (containers/serverless), databases, caches, queues, and external services.
      - Use a single graph per block (`graph TD;` or `flowchart TD;`) and keep only node/edge definitions inside the block (no prose).
    - PLACEMENT REQUIREMENTS:
      - Put the endpoint catalog table under Section 8.
      - Put the threat table under Section 9.
      - Put the resilience defaults table under Section 10.
      - Put the SLI/SLO table under Section 11 and include at least 6 filled rows.
      - Put the ADR table under Section 12 and include at least 6 filled rows.
    The final output MUST be a complete, self-contained markdown document following the same structure as the template, describing the technology, data, and deployment architecture in enough detail that a senior engineer could start designing services and APIs from it.
  expected_output: >
    A complete architecture.md document with all sections filled based on the project idea and product requirements. No placeholder text or empty sections.
  agent: application_architect_agent
  input: >
    Use the following template and fill it based on the project idea and the detailed product requirements you read from 'output/product_requirements.md'. Template:
    {architecture_template}
  output_file: output/_disabled_architect_task.md
  context:
    - business_analyst_task
  create_directory: true

application_architect_spec_task:
  description: >
    You are the Application Architect. Project idea: {project_idea}.
    You will receive the Business Analyst product requirements (context).
    Produce a spec file that contains ONLY:
    - `## 4. Application Architecture`
    - `## 8. API and Integration Architecture`
    Copy those sections verbatim from `{architecture_template}`, then fill all bullet slots and tables.

    MUST include a valid mermaid `Component Diagram` inside the Section 4 area (single graph, valid syntax, no prose inside the mermaid block).
    MUST include the endpoint catalog table (the markdown table with headers + separator row) inside Section 8.
    MUST include representative JSON request/response/error shapes for at least 3 endpoints.
    MUST ensure auth expectations in endpoints match the security model (authn/authz method + enforcement points) implied by the requirements.

    First, use FileReadTool to read these knowledge files before writing:
    - 'knowledge/api-design-cookbook.md'
    - 'knowledge/ai-stack-playbook.md'
    - 'knowledge/external-skills/api-design-patterns.md'
    - 'knowledge/mermaid-diagram-standards.md'

    Output plain markdown only.
    - Your first non-empty characters must start with `## 4. Application Architecture` (never start with ``` or ```markdown).
    - Do NOT wrap the whole response in triple backticks; only mermaid fences are allowed.
  expected_output: >
    Spec markdown for Section 4 and Section 8 only; no other sections.
  agent: application_architect_agent
  input: >
    Product requirements:
    (from context)

    Architecture template:
    {architecture_template}
  output_file: output/spec_application.md
  create_directory: true
  context:
    - business_analyst_task

